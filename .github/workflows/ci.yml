name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Lint + testes do MVP (PHP puro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql, curl, dom
          coverage: none

      - name: Lint de todo o PHP (raiz + mvp)
        run: |
          set -e
          find app mvp/app mvp/public mvp/tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "Lint OK"

      - name: Testes do motor de folha (37 asserções, sem banco)
        run: php mvp/tests/payroll_tests.php
