# Infraestrutura local de desenvolvimento da PeopleFlow.
# Produção: PostgreSQL/Redis gerenciados (Railway), API no Railway, web na Vercel.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: peopleflow
      POSTGRES_PASSWORD: peopleflow
      POSTGRES_DB: peopleflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peopleflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
